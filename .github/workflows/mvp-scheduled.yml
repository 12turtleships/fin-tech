# Run mvp.py on a fixed schedule in GitHub's cloud (no Mac sleep issues).
# Schedule uses UTC — see CRON_MVP.md for local-time equivalents.
#
# Required repo secrets: OPENAI_API_KEY, COINBASE_API_KEY, COINBASE_PRIVATE_KEY
# Optional: SERPAPI_KEY, INITIAL_CAPITAL_USD

name: DOGE MVP scheduled

on:
  schedule:
    # Every 6 hours at :20 UTC (00:20, 06:20, 12:20, 18:20)
    - cron: "20 */6 * * *"
  workflow_dispatch: {}

concurrency:
  group: doge-mvp-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run-mvp:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      COINBASE_API_KEY: ${{ secrets.COINBASE_API_KEY }}
      COINBASE_PRIVATE_KEY: ${{ secrets.COINBASE_PRIVATE_KEY }}
      SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
      INITIAL_CAPITAL_USD: ${{ secrets.INITIAL_CAPITAL_USD }}
      CB_ENABLED: "1"
      FEE_GATE_MIN_PCT: "1.5"
      CB_ATR_RISK_PCT: "2.0"
      CONSECUTIVE_BUY_FORBID_AFTER: "4"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Mutable DB: new key each run so GitHub always saves an updated cache after the job.
      - name: Cache trading_data.db
        uses: actions/cache@v4
        with:
          path: trading_data.db
          key: doge-sqlite-${{ github.run_id }}
          restore-keys: |
            doge-sqlite-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run MVP
        run: python mvp.py

      # Lets you run `mvp.py --trades` locally against the same SQLite the runner used (download this artifact).
      - name: Upload trading_data.db artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trading_data_db
          path: trading_data.db
          if-no-files-found: ignore
